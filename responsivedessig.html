<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Responsive Design</title>

<style>
body{
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    background: #1e40af;
    font-family: Arial, sans-serif;
    color:#fff;
}

/* Wrapper */
.container{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
    justify-content:center;
}

/* Card */
.card{
    width:260px;
    padding:22px;
    border-radius:16px;

    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);

    border:1px solid rgba(148,163,184,0.18);

    box-shadow:0 15px 40px rgba(0,0,0,0.5);

    position:relative;
    overflow:hidden;

    transition:0.3s;
}

/* soft tech glow */
.card::before{
    content:"";
    position:absolute;
    inset:-40%;
    background: radial-gradient(circle,
        rgba(59,130,246,0.2),
        transparent 60%
    );
    transform: rotate(25deg);
}

/* content */
.content{
    position:relative;
    z-index:1;
}

/* icon */
.icon{
    width:45px;
    height:45px;
    border-radius:12px;

    display:flex;
    justify-content:center;
    align-items:center;

    background: linear-gradient(135deg, #3b82f6, #1e40af);

    font-size:20px;
    margin-bottom:12px;
}

/* title */
h3{
    margin:0 0 8px;
    font-size:16px;
}

/* text */
p{
    margin:0;
    font-size:13px;
    color:#94a3b8;
    line-height:1.5;
}

/* hover */
.card:hover{
    transform: translateY(-6px) scale(1.03);
    box-shadow:0 25px 60px rgba(0,0,0,0.7);
}

/* RESPONSIVE */
@media (max-width: 900px){
    .card{
        width:45%;
    }
}

@media (max-width: 600px){
    .card{
        width:100%;
    }
}
</style>

</head>

<body>

<div class="container">
    <h2>Responsive design</h2>

    <div class="card">
        <div class="content">
            <div class="icon">💻</div>
            <h3>Desktop Ready</h3>
            <p>Perfect layout optimized for large screens and modern desktop apps.</p>
        </div>
    </div>

    <div class="card">
        <div class="content">
            <div class="icon">📱</div>
            <h3>Mobile Friendly</h3>
            <p>Fully responsive design that adapts smoothly to all mobile devices.</p>
        </div>
    </div>

    <div class="card">
        <div class="content">
            <div class="icon">📊</div>
            <h3>Tablet Optimized</h3>
            <p>Balanced UI experience for tablets with clean spacing and layout.</p>
        </div>
    </div>

</div>

</body>
</html>
